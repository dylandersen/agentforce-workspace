<template>
  <template lwc:if={hasData}>
    <div class="chart-container">
      <!-- Header -->
      <div class="chart-header">
        <div class="chart-header-left">
          <lightning-icon icon-name="utility:chart" size="xx-small" class="chart-header-icon"></lightning-icon>
          <h3 class="chart-title">{chartData.title}</h3>
        </div>
        <div class="chart-header-actions">
          <button class="chart-action-btn" onclick={handleCycleType} title={cycleTitle} disabled={cycleDisabled}>
            <svg viewBox="0 0 16 16" fill="none" class="chart-action-icon" aria-hidden="true">
              <path d="M1.5 8a6.5 6.5 0 0111.48-4.16M14.5 8a6.5 6.5 0 01-11.48 4.16" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M13.5 1v3h-3M2.5 15v-3h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <template lwc:if={showExpandBtn}>
            <button class="chart-action-btn" onclick={handleExpand} title="Expand visualization">
              <svg viewBox="0 0 16 16" fill="none" class="chart-action-icon" aria-hidden="true">
                <path d="M9 2h5v5M7 14H2V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M14 2L9 7M2 14l5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </template>
        </div>
      </div>

      <template lwc:if={hasMultipleChartTypes}>
        <p class="chart-type-chip">Showing {chartTypeLabel}</p>
      </template>

      <!-- Bar Chart -->
      <template lwc:if={isBarChart}>
        <div class="bar-chart">
          <div class="bar-y-axis">
            <template for:each={yAxisLabels} for:item="label">
              <div key={label.key} class="bar-y-line" style={label.style}>
                <span class="bar-y-label">{label.text}</span>
              </div>
            </template>
          </div>
          <div class="bar-area">
            <template for:each={processedItems} for:item="item">
              <div key={item.key} class="bar-col">
                <div class="bar-fill" style={item.barStyle}>
                  <div class="bar-tooltip-wrap">
                    <span class="bar-tooltip-value">{item.formattedValue}</span>
                    <span class="bar-tooltip-label">{item.label}</span>
                  </div>
                </div>
                <span class="bar-x-label" title={item.label}>{item.shortLabel}</span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Horizontal Bar Chart -->
      <template lwc:if={isHorizontalBar}>
        <div class="hbar-chart">
          <template for:each={processedItems} for:item="item">
            <div key={item.key} class="hbar-row">
              <span class="hbar-label" title={item.label}>{item.shortLabelH}</span>
              <div class="hbar-track">
                <div class="hbar-fill" style={item.hbarStyle}>
                  <span class="hbar-value">{item.formattedValue}</span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Donut Chart -->
      <template lwc:if={isDonutChart}>
        <div class="donut-layout">
          <div class="donut-svg-wrap">
            <svg viewBox="0 0 100 100" class="donut-svg">
              <template for:each={donutSegments} for:item="seg">
                <circle key={seg.key}
                  class="donut-segment"
                  cx="50" cy="50" r="35"
                  stroke={seg.color}
                  stroke-dasharray={seg.dashArray}
                  stroke-dashoffset={seg.dashOffset}
                  fill="none"
                  stroke-width="14"
                ></circle>
              </template>
            </svg>
            <div class="donut-center">
              <span class="donut-total">{donutTotal}</span>
              <span class="donut-total-label">{chartData.valueLabel}</span>
            </div>
          </div>
          <div class="donut-legend">
            <template for:each={processedItems} for:item="item">
              <div key={item.key} class="donut-legend-row">
                <span class="donut-swatch" style={item.swatchStyle}></span>
                <span class="donut-legend-label">{item.label}</span>
                <span class="donut-legend-value">{item.formattedValue}</span>
                <span class="donut-legend-pct">{item.pctLabel}</span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Line Chart -->
      <template lwc:if={isLineChart}>
        <div class="line-chart">
          <div class="bar-y-axis">
            <template for:each={yAxisLabels} for:item="label">
              <div key={label.key} class="bar-y-line" style={label.style}>
                <span class="bar-y-label">{label.text}</span>
              </div>
            </template>
          </div>
          <div class="line-area">
            <div class="line-grid">
              <template for:each={yAxisLabels} for:item="label">
                <div key={label.key} class="line-grid-row" style={label.style}></div>
              </template>
            </div>
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="line-svg" aria-hidden="true">
              <polygon points={lineAreaPoints} class="line-area-fill"></polygon>
              <polyline points={linePoints} class="line-path"></polyline>
            </svg>
            <template for:each={linePointNodes} for:item="point">
              <div key={point.key} class="line-point-node" style={point.style}>
                <span class="line-point-dot" style={point.swatchStyle}></span>
                <div class="line-tooltip-wrap">
                  <span class="bar-tooltip-value">{point.formattedValue}</span>
                  <span class="bar-tooltip-label">{point.label}</span>
                </div>
              </div>
            </template>
            <div class="line-x-axis">
              <template for:each={processedItems} for:item="item">
                <span key={item.key} class="line-x-label" title={item.label}>{item.shortLabel}</span>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Funnel Chart -->
      <template lwc:if={isFunnelChart}>
        <div class="funnel-chart">
          <div class="funnel-visual-wrap">
            <svg viewBox="0 0 100 100" class="funnel-svg" aria-hidden="true">
              <template for:each={funnelSegments} for:item="segment">
                <g key={segment.key}>
                  <polygon points={segment.points} fill={segment.fill} class="funnel-segment-shape"></polygon>
                  <text x="50" y={segment.valueY} text-anchor="middle" class="funnel-segment-value">{segment.formattedValue}</text>
                  <text x="50" y={segment.labelY} text-anchor="middle" class="funnel-segment-label">{segment.shortLabelH}</text>
                </g>
              </template>
            </svg>
          </div>
          <div class="funnel-details">
            <template for:each={funnelItems} for:item="item">
              <div key={item.key} class="funnel-detail-row">
                <div class="funnel-detail-main">
                  <span class="funnel-detail-label">{item.label}</span>
                  <span class="funnel-detail-note">{item.fromPreviousLabel}</span>
                </div>
                <span class="funnel-detail-value">{item.formattedValue}</span>
                <span class="funnel-detail-share">{item.fromStartLabel}</span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Metric Strip -->
      <template lwc:if={isMetricStrip}>
        <div class="metric-strip">
          <template for:each={processedItems} for:item="item">
            <div key={item.key} class="metric-card">
              <span class="metric-card-accent" style={item.metricAccentStyle}></span>
              <span class="metric-label">{item.label}</span>
              <span class="metric-value">{item.formattedValue}</span>
              <template lwc:if={showMetricShare}>
                <span class="metric-meta">{item.pctLabel} of total</span>
              </template>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>
</template>
